<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 
        Tailwind CDN
    -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- 
        Link to CSS
    -->

    <link rel="stylesheet" href="styles.css">

    <title>Join Waitlist | Taskr</title>
</head>
<body class="flex flex-col items-center h-screen bg-[#F4F6F8]">

    <main class="h-8/10 w-full flex justify-center items-center">
        <div class="card flex flex-col gap-3 items-center bg-[#FFFFFF] w-3/10 p-10">
            <h2 class="font-bold text-3xl text-[#1A1D20]">Get early access</h2>
            <p class="text-md text-[#828C95]">Join the Taskr waitlist today.</p>

            <form action="#" class="flex flex-col gap-5 mt-10 w-full">
                <input type="text" placeholder="Name"
                class="w-full border border-solid border-[#828C95] px-6 py-3">

                <input type="email" placeholder="Email"
                class="w-full border border-solid border-[#828C95] px-6 py-3" >

                <select name="size" id="team-size" class="w-full border border-solid border-[#828C95] px-6 py-3">
                    <optgroup value="0" disabled>Team Size</optgroup>
                    <option value="1">Team Size</option>
                    <option value="2">2-3</option>
                    <option value="3">3-7</option>
                    <option value="4">7-50</option>
                </select>

                <button class="bg-[#0BB778] px-6 py-3 text-white font-semibold">Join waitlist</button>
            </form>
        </div>
    </main>

    <footer class="h-2/10 w-full flex flex-col gap-3 items-center justify-center">
        <div class="contact flex gap-10">
            <a href="#">X</a>
            <a href="#">Email</a>
        </div>
        <p class="copyright">
            &copy 2026 Taskr. Built in Lagos.
        </p>
    </footer>
</body>
</html>
