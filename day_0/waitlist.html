<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 
        Tailwind CDN
    -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- 
        Link to CSS
    -->

    <link rel="stylesheet" href="styles.css">

    <title>Join Waitlist | Taskr</title>
</head>
<body class="flex flex-col items-center min-h-screen bg-[#F4F6F8] px-4 sm:px-6 py-6 sm:py-8">

    <main class="flex-1 w-full flex justify-center items-center py-8">
        <div class="card flex flex-col gap-3 items-center bg-[#FFFFFF] w-full max-w-md md:max-w-lg p-6 sm:p-8 md:p-10 rounded-2xl shadow-sm">
            <h2 class="font-bold text-2xl sm:text-3xl text-[#1A1D20] text-center">Get early access</h2>
            <p class="text-sm sm:text-md text-[#828C95] text-center">Join the Taskr waitlist today.</p>

            <form action="#" class="flex flex-col gap-4 sm:gap-5 mt-8 sm:mt-10 w-full">
                <input type="text" placeholder="Name"
                class="w-full border border-solid border-[#828C95] px-4 sm:px-6 py-3 rounded-xl">

                <input type="email" placeholder="Email"
                class="w-full border border-solid border-[#828C95] px-4 sm:px-6 py-3 rounded-xl" >

                <select name="size" id="team-size" class="w-full border border-solid border-[#828C95] px-4 sm:px-6 py-3 rounded-xl bg-white">
                    <optgroup value="0" disabled>Team Size</optgroup>
                    <option value="1">Team Size</option>
                    <option value="2">2-3</option>
                    <option value="3">3-7</option>
                    <option value="4">7-50</option>
                </select>

                <button class="bg-[#0BB778] px-6 py-3 text-white font-semibold rounded-xl w-full">Join waitlist</button>
            </form>
        </div>
    </main>

    <footer class="w-full flex flex-col gap-3 items-center justify-center py-6 text-center">
        <div class="contact flex flex-wrap justify-center gap-6 sm:gap-10">
            <a href="#">X</a>
            <a href="#">Email</a>
        </div>
        <p class="copyright">
            &copy 2026 Taskr. Built in Lagos.
        </p>
    </footer>
</body>
</html>
